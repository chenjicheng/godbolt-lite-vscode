name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test:unit

  integration:
    name: Extension Host (${{ matrix.vscode-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        vscode-version:
          - "1.90.0"
          - stable

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Extension Host smoke test
        run: xvfb-run -a npm run test:integration -- --version "${{ matrix.vscode-version }}"

  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs:
      - unit
      - integration

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package VSIX
        run: npm run package

      - name: Verify packaged VSIX runtime
        run: xvfb-run -a node test/run-vsix-install-test.mjs --version stable
